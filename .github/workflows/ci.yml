name: 🚦 CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eslint:
    name: 🔬 ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: ESLint
        run: npm run lint:js

  stylelint:
    name: 🎨 Stylelint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Stylelint
        run: npm run lint:css

  prettier:
    name: 💅 Prettier
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Prettier
        run: npm run prettier:check

  typecheck:
    name: 👾 TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: TypeScript
        run: npm run typecheck
