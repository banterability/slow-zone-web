name: 🏗️ Setup
description: Set up Node & install dependencies

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        cache: pnpm
        node-version-file: .node-version

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
